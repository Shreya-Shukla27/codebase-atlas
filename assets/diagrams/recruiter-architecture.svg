<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="380" viewBox="0 0 1000 380">
  <style>
    .card { fill:#0b1220; stroke:#94f9ff; stroke-width:1.5px; rx:8; }
    .svc { fill:#071029; stroke:#7ee787; stroke-width:1.5px; rx:8; }
    .ext { fill:#0f172a; stroke:#fbbf24; stroke-width:1.5px; rx:8; }
    .ai { fill:#1b0636; stroke:#c084fc; stroke-width:1.5px; rx:8; }
    .label { font-family: Inter, Arial, Helvetica, sans-serif; fill:#e6f6ff; font-size:14px; }
    .muted { font-size:12px; fill:#9fb3c9; }
    .arrow { stroke:#6b7280; stroke-width:2px; marker-end:url(#a); }
  </style>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#6b7280" />
    </marker>
  </defs>

  <!-- User -->
  <rect x="40" y="36" width="140" height="56" class="card"/>
  <text x="110" y="70" text-anchor="middle" class="label">User / Browser</text>

  <!-- Frontend -->
  <rect x="220" y="20" width="240" height="100" class="svc"/>
  <text x="340" y="46" text-anchor="middle" class="label">Next.js Frontend</text>
  <text x="340" y="66" text-anchor="middle" class="muted">React · React Flow · SSR</text>

  <!-- Backend -->
  <rect x="520" y="20" width="240" height="100" class="svc"/>
  <text x="640" y="46" text-anchor="middle" class="label">FastAPI Backend</text>
  <text x="640" y="66" text-anchor="middle" class="muted">Repo graph builder · Chat SSE</text>

  <!-- GitHub -->
  <rect x="220" y="160" width="200" height="64" class="ext"/>
  <text x="320" y="192" text-anchor="middle" class="label">GitHub API</text>
  <text x="320" y="208" text-anchor="middle" class="muted">Tree, commits, contents</text>

  <!-- AI -->
  <rect x="520" y="160" width="200" height="64" class="ai"/>
  <text x="620" y="192" text-anchor="middle" class="label">Anthropic (Claude)</text>
  <text x="620" y="208" text-anchor="middle" class="muted">Streaming chat model</text>

  <!-- Infra -->
  <rect x="780" y="36" width="160" height="56" class="ext"/>
  <text x="860" y="70" text-anchor="middle" class="label">Vercel / Render</text>
  <text x="860" y="88" text-anchor="middle" class="muted">Hosting & CI/CD</text>

  <!-- Arrows -->
  <path d="M180 64 L220 64" class="arrow"/>
  <path d="M460 70 L520 70" class="arrow"/>
  <path d="M600 120 L600 160" class="arrow"/>
  <path d="M740 64 L780 64" class="arrow"/>
  <path d="M420 224 L420 184" class="arrow"/>

  <!-- Short flow labels -->
  <text x="310" y="32" text-anchor="middle" class="muted">Static UI + Graph</text>
  <text x="570" y="32" text-anchor="middle" class="muted">API: /api/repo, /api/chat</text>
  <text x="420" y="140" text-anchor="middle" class="muted">Fetch tree → commits → imports</text>

  <!-- Footnote -->
  <text x="20" y="360" class="muted">Recruiter-friendly architecture: clear components, responsibilities, and integrations.</text>

</svg>
