<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="380" viewBox="0 0 1000 380">
  <!-- Inline styles to avoid GitHub SVG sanitization issues -->
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#6b7280" />
    </marker>
  </defs>

  <!-- User -->
  <rect x="40" y="36" width="140" height="56" style="fill:#0b1220;stroke:#94f9ff;stroke-width:1.5px;rx:8" />
  <text x="110" y="70" text-anchor="middle" style="font-family:Inter, Arial, Helvetica, sans-serif;fill:#e6f6ff;font-size:14px">User / Browser</text>

  <!-- Frontend -->
  <rect x="220" y="20" width="240" height="100" style="fill:#071029;stroke:#7ee787;stroke-width:1.5px;rx:8" />
  <text x="340" y="46" text-anchor="middle" style="font-family:Inter, Arial, Helvetica, sans-serif;fill:#e6f6ff;font-size:14px">Next.js Frontend</text>
  <text x="340" y="66" text-anchor="middle" style="font-size:12px;fill:#9fb3c9">React · React Flow · SSR</text>

  <!-- Backend -->
  <rect x="520" y="20" width="240" height="100" style="fill:#071029;stroke:#7ee787;stroke-width:1.5px;rx:8" />
  <text x="640" y="46" text-anchor="middle" style="font-family:Inter, Arial, Helvetica, sans-serif;fill:#e6f6ff;font-size:14px">FastAPI Backend</text>
  <text x="640" y="66" text-anchor="middle" style="font-size:12px;fill:#9fb3c9">Repo graph builder · Chat SSE</text>

  <!-- GitHub -->
  <rect x="220" y="160" width="200" height="64" style="fill:#0f172a;stroke:#fbbf24;stroke-width:1.5px;rx:8" />
  <text x="320" y="192" text-anchor="middle" style="font-family:Inter, Arial, Helvetica, sans-serif;fill:#e6f6ff;font-size:14px">GitHub API</text>
  <text x="320" y="208" text-anchor="middle" style="font-size:12px;fill:#9fb3c9">Tree, commits, contents</text>

  <!-- AI -->
  <rect x="520" y="160" width="200" height="64" style="fill:#1b0636;stroke:#c084fc;stroke-width:1.5px;rx:8" />
  <text x="620" y="192" text-anchor="middle" style="font-family:Inter, Arial, Helvetica, sans-serif;fill:#e6f6ff;font-size:14px">Anthropic (Claude)</text>
  <text x="620" y="208" text-anchor="middle" style="font-size:12px;fill:#9fb3c9">Streaming chat model</text>

  <!-- Infra -->
  <rect x="780" y="36" width="160" height="56" style="fill:#0f172a;stroke:#fbbf24;stroke-width:1.5px;rx:8" />
  <text x="860" y="70" text-anchor="middle" style="font-family:Inter, Arial, Helvetica, sans-serif;fill:#e6f6ff;font-size:14px">Vercel / Render</text>
  <text x="860" y="88" text-anchor="middle" style="font-size:12px;fill:#9fb3c9">Hosting & CI/CD</text>

  <!-- Arrows -->
  <path d="M180 64 L220 64" style="stroke:#6b7280;stroke-width:2px;marker-end:url(#a)" />
  <path d="M460 70 L520 70" style="stroke:#6b7280;stroke-width:2px;marker-end:url(#a)" />
  <path d="M600 120 L600 160" style="stroke:#6b7280;stroke-width:2px;marker-end:url(#a)" />
  <path d="M740 64 L780 64" style="stroke:#6b7280;stroke-width:2px;marker-end:url(#a)" />
  <path d="M420 224 L420 184" style="stroke:#6b7280;stroke-width:2px;marker-end:url(#a)" />

  <!-- Short flow labels -->
  <text x="310" y="32" text-anchor="middle" style="font-size:12px;fill:#9fb3c9">Static UI + Graph</text>
  <text x="570" y="32" text-anchor="middle" style="font-size:12px;fill:#9fb3c9">API: /api/repo, /api/chat</text>
  <text x="420" y="140" text-anchor="middle" style="font-size:12px;fill:#9fb3c9">Fetch tree → commits → imports</text>

  <!-- Footnote -->
  <text x="20" y="360" style="font-size:12px;fill:#9fb3c9">Recruiter-friendly architecture: clear components, responsibilities, and integrations.</text>

</svg>
