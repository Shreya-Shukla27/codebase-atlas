<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="360" viewBox="0 0 800 360">
  <style>
    .step { fill:#0f172a; stroke:#38bdf8; stroke-width:2px; rx:6; }
    .out { fill:#052e16; stroke:#4ade80; stroke-width:2px; rx:6; }
    .label { font-family: Inter, Helvetica, Arial, sans-serif; fill:#e0f2fe; font-size:13px; }
    .small { font-size:12px; fill:#cbd5e1; }
    .arrow { stroke:#9ca3af; stroke-width:2px; marker-end:url(#a); }
  </style>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#9ca3af" />
    </marker>
  </defs>

  <rect x="40" y="40" width="160" height="56" class="step"/>
  <text x="120" y="74" text-anchor="middle" class="label">GitHub tree fetch</text>

  <rect x="260" y="40" width="200" height="56" class="step"/>
  <text x="360" y="74" text-anchor="middle" class="label">File filtering + commit counts</text>

  <rect x="520" y="40" width="200" height="56" class="step"/>
  <text x="620" y="74" text-anchor="middle" class="label">Import extraction + edge resolution</text>

  <rect x="300" y="160" width="200" height="56" class="out"/>
  <text x="400" y="194" text-anchor="middle" class="label">Repo graph JSON</text>

  <path d="M200 68 L260 68" class="arrow"/>
  <path d="M460 68 L520 68" class="arrow"/>
  <path d="M620 96 L400 160" class="arrow"/>

  <text x="120" y="100" class="small" text-anchor="middle">Recursive tree API</text>
  <text x="360" y="100" class="small" text-anchor="middle">count last 30 commits</text>

</svg>
