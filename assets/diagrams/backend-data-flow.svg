<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="380" viewBox="0 0 700 380">
  <style>
    .step { fill:#0f172a; stroke:#38bdf8; stroke-width:2px; rx:6; }
    .output { fill:#052e16; stroke:#4ade80; stroke-width:2px; rx:6; }
    .label { font-family: Inter, Helvetica, Arial, sans-serif; fill:#e0f2fe; font-size:13px; }
    .small { font-size:12px; fill:#c7f9e0; }
    .arrow { stroke:#9ca3af; stroke-width:2px; marker-end:url(#a); }
  </style>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#9ca3af" />
    </marker>
  </defs>

  <rect x="40" y="30" width="220" height="56" class="step"/>
  <text x="150" y="63" text-anchor="middle" class="label">GitHub tree fetch</text>

  <rect x="40" y="120" width="220" height="56" class="step"/>
  <text x="150" y="153" text-anchor="middle" class="label">File filtering + commit counts</text>

  <rect x="40" y="210" width="220" height="56" class="step"/>
  <text x="150" y="243" text-anchor="middle" class="label">Import extraction + edge resolution</text>

  <rect x="360" y="120" width="240" height="80" class="output"/>
  <text x="480" y="155" text-anchor="middle" class="label">Repo graph JSON</text>
  <text x="480" y="175" text-anchor="middle" class="small">Nodes, edges, stats</text>

  <path d="M260 58 L360 58" class="arrow"/>
  <path d="M260 148 L360 148" class="arrow"/>
  <path d="M260 238 L360 180" class="arrow"/>
  <path d="M480 200 L480 240" class="arrow"/>

</svg>
