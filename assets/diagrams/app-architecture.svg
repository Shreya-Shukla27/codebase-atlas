<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <style>
    .box { fill:#0f172a; stroke:#34d399; stroke-width:2px; rx:8; }
    .ext { fill:#1f2937; stroke:#f59e0b; stroke-width:2px; rx:8; }
    .ai { fill:#2e1065; stroke:#c084fc; stroke-width:2px; rx:8; }
    .label { font-family: Inter, Helvetica, Arial, sans-serif; fill:#e5f0ff; font-size:14px; }
    .small { font-size:12px; fill:#cbd5e1; }
    .arrow { stroke:#9ca3af; stroke-width:2px; marker-end:url(#a); }
  </style>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#9ca3af" />
    </marker>
  </defs>

  <!-- User -->
  <rect x="40" y="30" width="140" height="56" class="ext"/>
  <text x="110" y="65" text-anchor="middle" class="label">User</text>

  <!-- Frontend -->
  <rect x="220" y="30" width="220" height="80" class="box"/>
  <text x="330" y="60" text-anchor="middle" class="label">Next.js Frontend</text>
  <text x="330" y="78" text-anchor="middle" class="small">React Flow · UI</text>

  <!-- Backend -->
  <rect x="520" y="30" width="220" height="80" class="box"/>
  <text x="630" y="60" text-anchor="middle" class="label">FastAPI Backend</text>
  <text x="630" y="78" text-anchor="middle" class="small">Repo graph + Chat SSE</text>

  <!-- GitHub -->
  <rect x="360" y="170" width="160" height="56" class="ext"/>
  <text x="440" y="200" text-anchor="middle" class="label">GitHub API</text>

  <!-- AI Chat -->
  <rect x="680" y="170" width="160" height="56" class="ai"/>
  <text x="760" y="200" text-anchor="middle" class="label">Streaming Claude Chat</text>

  <!-- Arrows -->
  <path d="M180 58 L220 58" class="arrow"/>
  <path d="M440 110 L520 110" class="arrow"/>
  <path d="M610 110 L610 170" class="arrow"/>
  <path d="M440 110 L440 170" class="arrow"/>
  <path d="M630 110 L760 170" class="arrow"/>

  <!-- Labels on arrows -->
  <text x="300" y="45" text-anchor="middle" class="small">Repo URL + view mode</text>
  <text x="580" y="95" text-anchor="middle" class="small">GitHub API calls</text>

</svg>
